id: ui_fine_labels
spec_version: v1
display_name: UI Fine Labels (Example)
enabled: true
description: Fine-grained labels for frontend/UI-oriented samples.

trigger:
  domain_any_of: [web-frontend]
  language_any_of: [html, css, javascript, typescript]
  intent_any_of: [build, modify]
  task_any_of: [feature-implementation, code-refactoring, documentation]
  context_any_of: [snippet, single-file, multi-file]
  difficulty_any_of: [beginner, intermediate, advanced]

prompt: |
  你是一个前端 / UI 细粒度标注器。
  你会收到 conversation、preprocessed signals、以及 core labels。
  请严格按照 schema 输出 JSON，不要输出额外解释。

schema:
  component_type:
    type: multi_enum
    options: [layout, header, footer, form, table, modal, card, nav, editor, chart]
    description: Main UI components involved in the sample.

  interaction_pattern:
    type: multi_enum
    options: [display-only, crud, wizard, search-filter, inline-editing, drag-drop, dashboard]
    description: Dominant interaction patterns present in the task or solution.

  styling_scope:
    type: multi_enum
    options: [html-structure, css-layout, css-typography, css-theme, responsive-design, animation]
    description: Which styling concerns are central to the request.

  visual_complexity:
    type: enum
    options: [low, medium, high]
    description: Overall visual / composition complexity.

output:
  include_confidence: true
  allow_unmapped: true

dashboard:
  group: ui
  priority: 10
